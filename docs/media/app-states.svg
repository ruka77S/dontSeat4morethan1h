<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 420" role="img" aria-labelledby="title desc">
  <title id="title">Don't Seat 1h running states</title>
  <desc id="desc">Animated preview showing the working progress bar, centered break alert, and snoozed meeting-cat state.</desc>
  <defs>
    <linearGradient id="background" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f5efe3"/>
      <stop offset="0.54" stop-color="#e8f3ee"/>
      <stop offset="1" stop-color="#f4d9c4"/>
    </linearGradient>
    <linearGradient id="workFill" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#2f7f73"/>
      <stop offset="1" stop-color="#f2a65a"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#3d342b" flood-opacity="0.16"/>
    </filter>
    <style>
      .label { font: 700 28px 'Trebuchet MS', Verdana, sans-serif; fill: #252525; }
      .small { font: 600 17px 'Trebuchet MS', Verdana, sans-serif; fill: #5d5a54; }
      .tiny { font: 700 13px 'Trebuchet MS', Verdana, sans-serif; fill: #6b6256; letter-spacing: .04em; }
      .screen { fill: #fffaf0; stroke: #2c2823; stroke-width: 3; }
      .card { fill: rgba(255,255,255,.72); stroke: rgba(44,40,35,.16); stroke-width: 2; }
      .barTrack { fill: #efe1cb; }
      .alert { animation: alertPulse 1.35s ease-in-out infinite; transform-origin: 725px 194px; }
      .paw { animation: pawTap .55s ease-in-out infinite alternate; transform-origin: 162px 210px; }
      .bubble { animation: bubbleFloat 2.6s ease-in-out infinite alternate; }
      @keyframes alertPulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.035); } }
      @keyframes pawTap { from { transform: rotate(-5deg) translateY(0); } to { transform: rotate(7deg) translateY(3px); } }
      @keyframes bubbleFloat { from { transform: translateY(0); opacity: .62; } to { transform: translateY(-7px); opacity: 1; } }
    </style>
  </defs>

  <rect width="960" height="420" fill="url(#background)"/>
  <circle cx="128" cy="78" r="68" fill="#f8c271" opacity="0.35"/>
  <circle cx="836" cy="334" r="84" fill="#69a99a" opacity="0.22"/>
  <path d="M0 350 C140 322 207 382 335 356 C455 332 552 286 692 314 C807 338 880 300 960 270 L960 420 L0 420 Z" fill="#dcc5a4" opacity="0.32"/>

  <text x="480" y="52" text-anchor="middle" class="label">Don't Seat 1h</text>
  <text x="480" y="80" text-anchor="middle" class="small">a tiny tray app with a very serious cat coworker</text>

  <g transform="translate(50 120)" filter="url(#softShadow)">
    <rect class="card" width="265" height="230" rx="22"/>
    <text x="28" y="43" class="tiny">WORKING</text>
    <text x="28" y="77" class="label" font-size="24">chair time</text>
    <rect x="28" y="96" width="208" height="16" rx="8" class="barTrack"/>
    <rect x="28" y="96" width="38" height="16" rx="8" fill="url(#workFill)">
      <animate attributeName="width" values="38;186;38" dur="4.8s" repeatCount="indefinite"/>
    </rect>
    <text x="28" y="136" class="small">working 42m / 60m</text>
    <rect x="86" y="154" width="98" height="50" rx="9" class="screen"/>
    <circle cx="132" cy="148" r="34" fill="#d89157" stroke="#2c2823" stroke-width="3"/>
    <path d="M106 126 L118 95 L132 124 Z" fill="#d89157" stroke="#2c2823" stroke-width="3"/>
    <path d="M158 126 L146 95 L132 124 Z" fill="#d89157" stroke="#2c2823" stroke-width="3"/>
    <circle cx="121" cy="146" r="4" fill="#2c2823"/>
    <circle cx="143" cy="146" r="4" fill="#2c2823"/>
    <path d="M129 157 Q132 161 136 157" fill="none" stroke="#2c2823" stroke-width="3" stroke-linecap="round"/>
    <ellipse class="paw" cx="112" cy="205" rx="17" ry="10" fill="#f0c59b" stroke="#2c2823" stroke-width="3"/>
    <ellipse cx="157" cy="205" rx="17" ry="10" fill="#f0c59b" stroke="#2c2823" stroke-width="3"/>
  </g>

  <g transform="translate(348 120)" filter="url(#softShadow)">
    <rect class="card" width="265" height="230" rx="22"/>
    <text x="28" y="43" class="tiny">BREAK ALERT</text>
    <g class="alert">
      <rect x="28" y="66" width="209" height="92" rx="20" fill="#f29b59" stroke="#2c2823" stroke-width="3"/>
      <text x="132" y="106" text-anchor="middle" class="label" font-size="30" fill="#2c2823">MOVE!</text>
      <text x="132" y="133" text-anchor="middle" class="small" fill="#2c2823">stand up time</text>
    </g>
    <circle cx="132" cy="186" r="28" fill="#d89157" stroke="#2c2823" stroke-width="3"/>
    <path d="M112 170 L122 146 L132 170 Z" fill="#d89157" stroke="#2c2823" stroke-width="3"/>
    <path d="M152 170 L142 146 L132 170 Z" fill="#d89157" stroke="#2c2823" stroke-width="3"/>
    <path d="M93 216 Q132 190 171 216" fill="none" stroke="#2c2823" stroke-width="7" stroke-linecap="round">
      <animate attributeName="d" values="M93 216 Q132 190 171 216;M91 207 Q132 228 173 207;M93 216 Q132 190 171 216" dur="1.2s" repeatCount="indefinite"/>
    </path>
  </g>

  <g transform="translate(646 120)" filter="url(#softShadow)">
    <rect class="card" width="265" height="230" rx="22"/>
    <text x="28" y="43" class="tiny">SNOOZED</text>
    <text x="28" y="77" class="label" font-size="24">cat meeting</text>
    <rect x="34" y="96" width="194" height="112" rx="18" fill="#dae7ec" stroke="#2c2823" stroke-width="3"/>
    <rect x="54" y="114" width="154" height="62" rx="11" fill="#f8fbfc" stroke="#2c2823" stroke-width="3"/>
    <circle class="bubble" cx="86" cy="137" r="10" fill="#6ea79c"/>
    <circle class="bubble" cx="132" cy="137" r="10" fill="#f2a65a" style="animation-delay:.25s"/>
    <circle class="bubble" cx="178" cy="137" r="10" fill="#c86f5d" style="animation-delay:.5s"/>
    <circle cx="132" cy="190" r="28" fill="#d89157" stroke="#2c2823" stroke-width="3"/>
    <path d="M112 174 L122 150 L132 174 Z" fill="#d89157" stroke="#2c2823" stroke-width="3"/>
    <path d="M152 174 L142 150 L132 174 Z" fill="#d89157" stroke="#2c2823" stroke-width="3"/>
    <circle cx="122" cy="188" r="4" fill="#2c2823"/>
    <circle cx="143" cy="188" r="4" fill="#2c2823"/>
    <path d="M122 206 Q132 198 143 206" fill="none" stroke="#2c2823" stroke-width="3" stroke-linecap="round"/>
    <text x="132" y="226" text-anchor="middle" class="small">resume later</text>
  </g>
</svg>